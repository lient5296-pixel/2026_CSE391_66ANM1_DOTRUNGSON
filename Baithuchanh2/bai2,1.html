<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

form{
    width:400px;
}

label{
    display:block;
    margin-top:12px;
}

input{
    width:100%;
    padding:6px;
    margin-top:4px;
}

.error{
    color:red;
    font-size:13px;
}

.counter{
    font-size:12px;
    text-align:right;
}

.password-wrapper{
    position:relative;
}

.toggle{
    position:absolute;
    right:8px;
    top:8px;
    cursor:pointer;
}

.strength-bar{
    height:8px;
    margin-top:5px;
    background:#ddd;
}

.strength{
    height:100%;
    width:0%;
}

button{
    margin-top:15px;
    padding:8px 12px;
}
</style>
</head>

<body>

<h2>Đăng ký tài khoản</h2>

<form id="form">

<label>Họ và tên</label>
<input type="text" id="fullname" maxlength="50">
<div class="counter" id="nameCount">0/50</div>
<div class="error" id="fullnameError"></div>

<label>Email</label>
<input type="text" id="email">
<div class="error" id="emailError"></div>

<label>Mật khẩu</label>

<div class="password-wrapper">
<input type="password" id="password">
<span class="toggle" id="togglePass">👁</span>
</div>

<div class="strength-bar">
<div class="strength" id="strengthBar"></div>
</div>

<div class="error" id="passwordError"></div>

<button type="submit">Đăng ký</button>

</form>

<script>

function showError(id,msg){
    document.getElementById(id+"Error").innerText = msg
}

function clearError(id){
    document.getElementById(id+"Error").innerText = ""
}

function validateFullname(){

    const name = document.getElementById("fullname").value.trim()
    const regex = /^[A-Za-zÀ-ỹ\s]{3,}$/

    if(name === ""){
        showError("fullname","Không được trống")
        return false
    }

    if(!regex.test(name)){
        showError("fullname","Ít nhất 3 ký tự, chỉ chứa chữ")
        return false
    }

    clearError("fullname")
    return true
}

function validateEmail(){

    const email = document.getElementById("email").value.trim()
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

    if(!regex.test(email)){
        showError("email","Email không hợp lệ")
        return false
    }

    clearError("email")
    return true
}

function validatePassword(){

    const pass = document.getElementById("password").value
    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/

    if(!regex.test(pass)){
        showError("password","≥8 ký tự, có chữ hoa, thường, số")
        return false
    }

    clearError("password")
    return true
}

document.getElementById("password").addEventListener("input",function(){

    const pass = this.value
    const bar = document.getElementById("strengthBar")

    let score = 0

    if(pass.length >= 8) score++
    if(/[A-Z]/.test(pass)) score++
    if(/[a-z]/.test(pass)) score++
    if(/[0-9]/.test(pass)) score++
    if(/[^A-Za-z0-9]/.test(pass)) score++

    if(score <= 2){
        bar.style.width="33%"
        bar.style.background="red"
    }
    else if(score <=4){
        bar.style.width="66%"
        bar.style.background="orange"
    }
    else{
        bar.style.width="100%"
        bar.style.background="green"
    }

})

document.getElementById("togglePass").onclick = function(){

    const pass = document.getElementById("password")

    if(pass.type === "password"){
        pass.type = "text"
    }else{
        pass.type = "password"
    }

}

document.getElementById("fullname").addEventListener("input",function(){

    const length = this.value.length

    document.getElementById("nameCount").innerText =
    length + "/50"

})

document.querySelectorAll("input").forEach(el=>{
    el.addEventListener("input",()=>{
        if(el.id) clearError(el.id)
    })
})

document.getElementById("form").addEventListener("submit",function(e){

    e.preventDefault()

    const valid =
        validateFullname() &
        validateEmail() &
        validatePassword()

    if(valid){

        alert("Đăng ký thành công 🎉")

        this.reset()

        document.getElementById("strengthBar").style.width="0%"
        document.getElementById("nameCount").innerText="0/50"

    }

})

</script>

</body>
</html>
