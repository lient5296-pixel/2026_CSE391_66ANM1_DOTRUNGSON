<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng Điểm Sinh Viên</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

input{
    padding:6px;
    margin-right:10px;
}

button{
    padding:6px 10px;
}

table{
    margin-top:20px;
    border-collapse: collapse;
    width:600px;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
}

th{
    background:#f2f2f2;
}

.low{
    background:yellow;
}

#stats{
    margin-top:15px;
    font-weight:bold;
}
</style>

</head>
<body>

<h2>Quản lý điểm sinh viên</h2>

<label>Họ tên:</label>
<input type="text" id="name">

<label>Điểm:</label>
<input type="number" id="score" min="0" max="10" step="0.1">

<button id="addBtn">Thêm</button>

<table>
<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th>Điểm</th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<div id="stats"></div>

<script>

let students = []

function getRank(score){
    if(score >= 8.5) return "Giỏi"
    if(score >= 7) return "Khá"
    if(score >= 5) return "Trung bình"
    return "Yếu"
}

function renderTable(){

    const tbody = document.getElementById("tbody")
    tbody.innerHTML = ""

    let total = 0

    students.forEach((sv,index)=>{

        total += sv.score

        const tr = document.createElement("tr")

        if(sv.score < 5){
            tr.classList.add("low")
        }

        tr.innerHTML = `
            <td>${index+1}</td>
            <td>${sv.name}</td>
            <td>${sv.score}</td>
            <td>${getRank(sv.score)}</td>
            <td>
                <button data-index="${index}" class="deleteBtn">Xóa</button>
            </td>
        `

        tbody.appendChild(tr)
    })

    let avg = students.length ? (total/students.length).toFixed(2) : 0

    document.getElementById("stats").innerText =
        "Tổng sinh viên: " + students.length + " | Điểm trung bình: " + avg
}

function addStudent(){

    const nameInput = document.getElementById("name")
    const scoreInput = document.getElementById("score")

    const name = nameInput.value.trim()
    const score = parseFloat(scoreInput.value)

    if(name === ""){
        alert("Họ tên không được để trống")
        return
    }

    if(isNaN(score) || score < 0 || score > 10){
        alert("Điểm phải từ 0 đến 10")
        return
    }

    students.push({
        name:name,
        score:score
    })

    renderTable()

    nameInput.value = ""
    scoreInput.value = ""
    nameInput.focus()
}

document.getElementById("addBtn").addEventListener("click", addStudent)

document.getElementById("score").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        addStudent()
    }
})

document.getElementById("tbody").addEventListener("click", function(e){

    if(e.target.classList.contains("deleteBtn")){

        const index = e.target.dataset.index

        students.splice(index,1)

        renderTable()
    }

})

</script>

</body>
</html>
